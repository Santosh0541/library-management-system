<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library Management System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>📚 Library Management System</h1>
    <p>Manage books, members &amp; transactions</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="showTab('dashboard',this)">📊 Dashboard</div>
    <div class="tab" onclick="showTab('add-book',this)">📖 Add Book</div>
    <div class="tab" onclick="showTab('books',this)">🗂️ Books</div>
    <div class="tab" onclick="showTab('issue',this)">🔄 Issue/Return</div>
    <div class="tab" onclick="showTab('transactions',this)">📋 History</div>
  </div>

  <div class="section active" id="tab-dashboard">
    <div class="stats">
      <div class="stat-card"><div class="s-num" id="total-books">0</div><div class="s-label">Total Books</div></div>
      <div class="stat-card"><div class="s-num" id="available-books">0</div><div class="s-label">Available</div></div>
      <div class="stat-card"><div class="s-num" id="issued-books">0</div><div class="s-label">Issued</div></div>
      <div class="stat-card"><div class="s-num" id="total-fines">₹0</div><div class="s-label">Total Fines</div></div>
    </div>
    <div class="card"><h2>📖 Recently Added</h2><div id="recent-books"><div class="empty">No books yet.</div></div></div>
  </div>

  <div class="section" id="tab-add-book">
    <div class="card">
      <h2>📖 Add New Book</h2>
      <div class="form-grid">
        <div class="full"><label>Book Title</label><input id="b-title" placeholder="e.g. Data Structures in Java"/></div>
        <div><label>Author</label><input id="b-author" placeholder="Author name"/></div>
        <div><label>ISBN</label><input id="b-isbn" placeholder="e.g. 978-0-13-468599-1"/></div>
        <div><label>Genre</label>
          <select id="b-genre">
            <option>Computer Science</option><option>Mathematics</option><option>Physics</option>
            <option>Chemistry</option><option>Literature</option><option>History</option><option>Other</option>
          </select>
        </div>
        <div><label>Copies</label><input id="b-copies" type="number" placeholder="1" min="1" value="1"/></div>
      </div>
      <button class="submit-btn" onclick="addBook()">Add Book</button>
    </div>
  </div>

  <div class="section" id="tab-books">
    <div class="search-bar"><input id="book-search" placeholder="Search by title or author..." oninput="renderBooks()"/></div>
    <div id="books-list"><div class="empty">No books added yet.</div></div>
  </div>

  <div class="section" id="tab-issue">
    <div class="card">
      <h2>📤 Issue Book</h2>
      <div class="form-grid">
        <div><label>Member Name</label><input id="i-member" placeholder="Student/Member name"/></div>
        <div><label>Member ID</label><input id="i-mid" placeholder="e.g. M001"/></div>
        <div class="full"><label>Select Book</label><select id="i-book"><option value="">-- Select Available Book --</option></select></div>
      </div>
      <button class="submit-btn" onclick="issueBook()">Issue Book</button>
    </div>
    <div class="card">
      <h2>📥 Return Book</h2>
      <div class="form-grid">
        <div class="full"><label>Select Issued Book</label><select id="r-book"><option value="">-- Select Issued Book --</option></select></div>
      </div>
      <button class="submit-btn" style="background:var(--red)" onclick="returnBook()">Return &amp; Calculate Fine</button>
    </div>
  </div>

  <div class="section" id="tab-transactions">
    <div id="txn-list"><div class="empty">No transactions yet.</div></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
